name: Build and publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: linux
            arch: --x64 --arm64
            artifacts: |
              dist/*.AppImage
              dist/*.deb
          - name: macOS
            os: macos-latest
            target: mac
            arch: --x64 --arm64
            artifacts: |
              dist/*.dmg
              dist/*.zip
          - name: Windows
            os: windows-latest
            target: win
            arch: --x64
            artifacts: |
              dist/*.exe
    runs-on: ${{ matrix.os }}
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Decode notarization API key
        if: matrix.target == 'mac'
        run: echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
      - name: Build installers
        run: npm run dist:${{ matrix.target }} -- ${{ matrix.arch }} --publish never
        env:
          # macOS jobs sign with the Developer ID cert and notarize. Other jobs
          # have no signing secrets, so they build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.target == 'mac' && 'true' || 'false' }}
          CSC_LINK: ${{ matrix.target == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.target == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_API_KEY: ${{ matrix.target == 'mac' && format('{0}/AuthKey.p8', runner.temp) || '' }}
          APPLE_API_KEY_ID: ${{ matrix.target == 'mac' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.target == 'mac' && secrets.APPLE_API_ISSUER || '' }}
      - name: Verify arm64 AppImage runtime is self-contained
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          appimages=(dist/*-arm64.AppImage)
          if (( ${#appimages[@]} != 1 )); then
            echo "expected exactly one arm64 AppImage, found ${#appimages[@]}" >&2
            exit 1
          fi
          dynamic_section=$(readelf -d "${appimages[0]}")
          if grep -q NEEDED <<<"$dynamic_section"; then
            echo "arm64 AppImage runtime has unexpected shared-library dependencies" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: memo-${{ matrix.target }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
      - name: Create release and upload installers
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" release-artifacts/**/* --verify-tag --generate-notes --title "Memo ${TAG#v}"
